origins: http://localhost,http://localhost:8888,http://localhost:13082,http://127.0.0.1:13082,https://localhost,
permit-all: /tmf-api/**


server:
  port: 13082
  servlet:
    context-path: /tmf-api
  ssl:
    enabled: false

springdoc:
  version: '@springdoc.version@'
  writer-with-default-pretty-printer: true
  swagger-ui:
    display-request-duration: true
    groups-order: ASC
    operationsSorter: method
    disable-swagger-default-url: true
    use-root-path: true
    oauth:
      client-id: osapiWebClientId
      clientsecret: "secret"
      use-pkce-with-authorization-code-grant: false
  oAuthFlow:
    authorizationUrl: http://keycloak:8080/auth/realms/openslice/protocol/openid-connect/auth
    tokenUrl: http://keycloak:8080/auth/realms/openslice/protocol/openid-connect/token
  show-actuator: true

spring-addons:
  issuers:
  - uri: http://keycloak:8080/auth/realms/openslice
    username-json-path: $.preferred_username
    claims:
    - jsonPath: $.realm_access.roles
    - jsonPath: $.resource_access.*.roles

spring:
  web:
    error:
      include-message: always
  config:
    activate:
      on-profile: "default"
  application:
    name: openslice-aim915-api
  datasource:
    url: jdbc:mysql://localhost:3306/aim915db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: letmein
    hikari:
      minimumIdle: 2
      maximumPoolSize: 20
      idleTimeout: 20000
      connectionTimeout: 40000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    generate-ddl: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart.max-file-size: 10MB
    multipart.max-request-size: 10MB
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/auth/realms/openslice
          jwk-set-uri: http://keycloak:8080/auth/realms/openslice/.well-known/openid-configuration
  jackson:
    date-format: org.etsi.osl.controllers.tmf915.RFC3339DateFormat
logging:
  level:
    root: INFO
    portal.api: INFO
    org.etsi.osl.controllers.tmf915: DEBUG
    org.springframework: INFO
    com.zaxxer.hikari: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n"
    file: "%d %p %c{1.} [%t] %m%n"

oauthsign:
  key: "EK97Y7Y9WPGG1MEG"

mlflow: # MLflow configuration for AIM915 model management
  enabled: true
  # MLflow tracking server host
  host: "127.0.0.1"
  port: 5000
  # Optional: override the tracking URI (empty = auto-build from host:port)
  tracking-uri: ""
  connection-timeout: 30000 #ms
  read-timeout: 60000 #ms
  docker: # Docker deployment configuration
    # Enable Docker-based model deployment
    enabled: false
    # Docker daemon host (e.g., 10.0.0.1)
    host: ""
    # Docker API port (2375 = unencrypted, 2376 = TLS)
    port: 2375
    # Enable TLS for Docker API communication
    tls-enabled: false
    # MLflow Docker image to use for model serving
    image: "ghcr.io/mlflow/mlflow:v2.10.0"
    # Default container port for model serving
    container-port: 5001
    # Timeout waiting for container to become healthy
    startup-timeout-seconds: 120

aimodel: # AIM915 model management configuration
  deployment:
    default-platform: mlflow # Options: mlflow, seldon, kserve, triton, custom
    # Base URL for model serving endpoints (used in AiModel creation)
    # Leave empty to auto-generate based on server configuration
    serving-base-url: ""
  specification:
    default-lifecycle-status: "Active"
  artifacts:
    # Local storage path for downloaded artifacts
    storage-path: "/tmp/aim915/artifacts"
    max-size: 1073741824 # 1 GB
