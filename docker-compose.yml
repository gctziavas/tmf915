services:

  # ── MySQL ──────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: letmein
      MYSQL_DATABASE: aim915db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pletmein"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Keycloak ───────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command:
      - start-dev
      - --http-relative-path=/auth
      - --import-realm
    environment:
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/keycloak?createDatabaseIfNotExist=true
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: letmein
      KC_BOOTSTRAP_ADMIN_USERNAME: kcadmin
      KC_BOOTSTRAP_ADMIN_PASSWORD: kcadmin
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak/openslice-realm.json:/opt/keycloak/data/import/openslice-realm.json:ro
    depends_on:
      mysql:
        condition: service_healthy

  # ── TMF 915 AI Management API ─────────────────────────────────────
  # MLflow (http://172.16.100.94:5000) and MinIO (http://172.16.100.94:9000)
  # run externally — not managed by this compose file.
  tmf915:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # ── Spring profile ──
      SPRING_PROFILES_ACTIVE: docker
      # ── Database ──
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/aim915db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: letmein
      # ── Keycloak / OAuth2 ──
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/auth/realms/openslice
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/auth/realms/openslice/protocol/openid-connect/certs
      # ── MLflow (external) ──
      MLFLOW_ENABLED: "true"
      MLFLOW_TRACKING_URI: http://172.16.100.94:5000
      MLFLOW_S3_ENDPOINT_URL: http://172.16.100.94:9000
      MLFLOW_S3_ACCESS_KEY: minioadmin
      MLFLOW_S3_SECRET_KEY: minioadmin
      MLFLOW_SYNC_ENABLED: "true"
      # ── Deployment URI exposed via env (maps to aimodel.deployment.serving-base-url) ──
      AIMODEL_DEPLOYMENT_SERVING_BASE_URL: ${AIMODEL_DEPLOYMENT_SERVING_BASE_URL:-}
      # ── Docker: connect to host Docker daemon ──
      MLFLOW_DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "13082:13082"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_started

volumes:
  mysql-data:
